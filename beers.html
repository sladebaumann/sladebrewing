<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Beers - Slade Brewing</title>
        <link rel="stylesheet" href="assets/css/style.css">
    </head>
    <body>
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <a href="/">
                        <img src="images/Slade Brewing - Main Logo Transparent.png" alt="Slade Brewing Logo" class="logo-img">
                    </a>
                </div>
                <ul class="nav-menu">
                    <li><a href="/" class="nav-link">Home</a></li>
                    <li><a href="/beers" class="nav-link">Our Beers</a></li>
                    <li><a href="/news" class="nav-link">News</a></li>
                    <li><a href="/#contact" class="nav-link">Contact</a></li>
                </ul>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="beers-page">
            <div class="container">
                <section class="beers-header">
                    <h1>Our Beers</h1>
                    <p>Explore our full lineup of craft beers brewed in Minneapolis.</p>
                </section>

                <section class="beers-container">
                    <h2>Current Lineup</h2>
                    <div id="current-beers-container" class="beer-grid"></div>
                    
                    <h2 style="margin-top: 3rem;">Past Lineup</h2>
                    <div id="past-beers-container" class="beer-grid"></div>
                </section>

                <div class="back-link">
                    <a href="/" class="btn btn-secondary">Back to Home</a>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 Slade Brewing. All rights reserved.</p>
            </div>
        </footer>

        <script src="assets/js/script.js"></script>
    </body>
</html>
